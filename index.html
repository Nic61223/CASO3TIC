<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Diagrama UML – Sistema IoT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --border:    #1e2330;
    --border2:   #2a3045;

    --broker-bg:   #0e1a2b;
    --broker-bd:   #1e4a7a;

    --teal:      #00c9a7;
    --teal-dim:  #00c9a720;
    --blue:      #4a9eff;
    --blue-dim:  #4a9eff18;
    --amber:     #f4a829;
    --amber-dim: #f4a82918;
    --purple:    #a78bfa;
    --purple-dim:#a78bfa18;
    --green:     #4ade80;
    --green-dim: #4ade8018;
    --coral:     #ff6b6b;
    --coral-dim: #ff6b6b18;
    --gray:      #8892a4;
    --gray-dim:  #8892a418;

    --text:      #e2e8f0;
    --text2:     #8892a4;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 32px 24px 60px;
  }

  h1 {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 11px;
    color: #454f63;
    letter-spacing: 0.05em;
    margin-bottom: 36px;
  }

  /* ── CANVAS SVG ── */
  .canvas-wrap {
    width: 100%;
    overflow-x: auto;
  }
  svg {
    display: block;
    width: 100%;
    min-width: 900px;
    height: auto;
  }

  /* ── LEYENDA ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 32px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    color: var(--text2);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-line { width: 28px; height: 2px; }
  .legend-diamond { width: 10px; height: 10px; transform: rotate(45deg); }
</style>
</head>
